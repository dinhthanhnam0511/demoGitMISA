<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISA Mimosa Coffee Shop POS - Login</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
        }
        .error {
            color: red;
            font-size: 0.9em;
        }
        .social-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .social-button {
            padding: 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        .btn-google { background-color: #db4437; color: white; }
        .btn-facebook { background-color: #3b5998; color: white; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>MISA Mimosa Coffee Shop</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <div class="error" id="emailError"></div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="button" onclick="togglePassword()">Show</button>
            <div class="error" id="passwordError"></div>
        </div>
        <button type="submit">Login</button>
        <div class="social-buttons">
            <button class="social-button btn-google">Login with Google</button>
            <button class="social-button btn-facebook">Login with Facebook</button>
        </div>
    </form>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById('password');
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
        } else {
            passwordField.type = 'password';
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();
        let valid = true;

        // Clear previous error messages
        document.getElementById('emailError').innerText = '';
        document.getElementById('passwordError').innerText = '';

        // Validate email
        const email = document.getElementById('email').value;
        if (!email.includes('@')) {
            document.getElementById('emailError').innerText = 'Invalid email format';
            valid = false;
        }

        // Validate password
        const password = document.getElementById('password').value;
        if (password.length < 6) {
            document.getElementById('passwordError').innerText = 'Password must be at least 6 characters';
            valid = false;
        }

        if (valid) {
            alert('Form submitted successfully!');
            // Here you can add the logic to handle successful login
        }
    });
</script>

</body>
</html>
